<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>99Freelas Monitor — Projetos Detectados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0f1a;
      --bg2:     #111827;
      --bg3:     #1a2235;
      --border:  #1e3a5f;
      --border2: #243b55;
      --accent:  #22d3ee;
      --accent2: #0ea5e9;
      --ag:      rgba(34,211,238,.12);
      --success: #10b981;
      --danger:  #ef4444;
      --warn:    #f59e0b;
      --text:    #e2e8f0;
      --text2:   #94a3b8;
      --text3:   #64748b;
      --r:       10px;
      --font:    'DM Sans', sans-serif;
      --mono:    'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ── */
    .page-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 64px;
    }

    .header-inner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
    }

    .header-logo {
      font-size: 20px;
      filter: drop-shadow(0 0 8px rgba(34,211,238,.5));
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Botões ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }

    .btn-primary { background: var(--accent2); color: #fff; }
    .btn-primary:hover { background: var(--accent); box-shadow: 0 0 14px rgba(14,165,233,.3); }

    .btn-ghost {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,.08); }

    .btn-outline {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-val.accent { color: var(--accent); }
    .stat-val.warn   { color: var(--warn);   }

    .stat-lbl {
      font-size: 10px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .stat-sep {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
      font-family: var(--mono);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.ok     { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,.5); animation: pulse 2s infinite; }
    .dot.error  { background: var(--danger);  box-shadow: 0 0 6px rgba(239,68,68,.5); }
    .dot.paused { background: var(--text3); }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .toolbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .search-input {
      flex: 1;
      max-width: 360px;
      padding: 8px 14px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus  { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }

    .sort-select {
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .sort-select:focus { border-color: var(--accent); }

    /* ── Grid de projetos ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .project-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }

    .project-card:hover {
      border-color: var(--accent);
      background: var(--ag);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }

    .project-card:hover::before { opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .new-badge {
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 9px;
      font-weight: 700;
      padding: 3px 7px;
      background: var(--ag);
      border: 1px solid rgba(34,211,238,.3);
      border-radius: 4px;
      color: var(--accent);
      font-family: var(--mono);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      flex: 1;
    }

    .card-title a {
      color: inherit;
      text-decoration: none;
    }
    .card-title a:hover { color: var(--accent); }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .tag-cat    { background: rgba(14,165,233,.12);  color: #7dd3fc; border: 1px solid rgba(14,165,233,.2); }
    .tag-budget { background: rgba(16,185,129,.1);   color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
    .tag-client { background: rgba(245,158,11,.08);  color: #fcd34d; border: 1px solid rgba(245,158,11,.15);}

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .card-time {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }

    .card-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent2);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 6px;
      background: rgba(14,165,233,.1);
      border: 1px solid rgba(14,165,233,.2);
      transition: all .2s;
    }
    .card-link:hover { background: rgba(14,165,233,.25); color: var(--accent); }

    /* ── Empty ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
      grid-column: 1/-1;
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-text { font-size: 15px; line-height: 1.7; }

    /* ── Paginação ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
    }

    .page-btn {
      padding: 7px 14px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text2);
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 9px;
      padding: 10px 22px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: all .3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: #6ee7b7; }
    .toast.error   { border-color: var(--danger);  color: #fca5a5; }
  </style>
</head>
<body>

<header class="page-header" style="position:relative;">
  <div class="header-inner">
    <span class="header-logo">⚡</span>
    <div>
      <div class="header-title">99Freelas Monitor</div>
      <div class="header-sub">Projetos detectados</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="btnCheckNow">🔍 Verificar agora</button>
      <button class="btn btn-ghost"   id="btnClear">🗑️ Limpar histórico</button>
      <button class="btn btn-primary" id="btnOpenFreelas">Abrir 99Freelas</button>
    </div>
  </div>
</header>

<main class="main">

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val accent" id="statTotal">0</div>
      <div class="stat-lbl">Total detectados</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statToday">0</div>
      <div class="stat-lbl">Hoje</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statChecks">0</div>
      <div class="stat-lbl">Verificações</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statOnPage">0</div>
      <div class="stat-lbl">Projetos na lista</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">–</span>
    </div>
  </div>

  <div class="toolbar">
    <span class="toolbar-title">📋 Histórico de projetos</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar nos projetos detectados…">
    <select class="sort-select" id="sortSelect">
      <option value="newest">Mais recentes</option>
      <option value="oldest">Mais antigos</option>
      <option value="alpha">A → Z</option>
    </select>
  </div>

  <div class="projects-grid" id="projectsGrid">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Nenhum projeto detectado ainda.<br>A extensão vai popular esta lista automaticamente.</div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

</main>

<div class="toast" id="toast"></div>

<script src="projects.js"></script>
</body>
</html>
