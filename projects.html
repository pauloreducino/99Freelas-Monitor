<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>99Freelas Monitor — Projetos Detectados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="projects.css">
</head>
<body>

<header class="page-header" style="position:relative;">
  <div class="header-inner">
    <span class="header-logo">⚡</span>
    <div>
      <div class="header-title">99Freelas Monitor</div>
      <div class="header-sub">Projetos detectados</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" id="btnCheckNow">🔍 Verificar agora</button>
      <button class="btn btn-ghost"   id="btnClear">🗑️ Limpar histórico</button>
      <button class="btn btn-primary" id="btnOpenFreelas">Abrir 99Freelas</button>
    </div>
  </div>
</header>

<main class="main">

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val accent" id="statTotal">0</div>
      <div class="stat-lbl">Total detectados</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statToday">0</div>
      <div class="stat-lbl">Hoje</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statChecks">0</div>
      <div class="stat-lbl">Verificações</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-val" id="statOnPage">0</div>
      <div class="stat-lbl">Projetos na lista</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">–</span>
    </div>
  </div>

  <div class="toolbar">
    <span class="toolbar-title">📋 Histórico de projetos</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar nos projetos detectados…">
    <select class="sort-select" id="sortSelect">
      <option value="newest">Mais recentes</option>
      <option value="oldest">Mais antigos</option>
      <option value="alpha">A → Z</option>
    </select>
  </div>

  <div class="projects-grid" id="projectsGrid">
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Nenhum projeto detectado ainda.<br>A extensão vai popular esta lista automaticamente.</div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>

</main>

<div class="toast" id="toast"></div>

<script src="projects.js"></script>
</body>
</html>
